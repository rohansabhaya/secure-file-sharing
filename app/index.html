<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVault | Enterprise File API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">
    <div class="max-w-6xl mx-auto py-12 px-6">
        
        <header class="mb-12 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">SecureVault <span class="text-indigo-600">v2.1</span></h1>
                <p class="text-slate-500 mt-1">Hashed Persistence & Secure Body Ingestion</p>
            </div>
            <div id="statusBadge" onclick="logout()" class="px-4 py-1.5 rounded-full bg-red-100 text-red-600 text-xs font-bold uppercase tracking-widest cursor-pointer hover:bg-red-200 transition-all border border-red-200">
                Disconnected
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 space-y-6">
                
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold mb-5 flex items-center gap-2">
                        <span class="w-1.5 h-5 bg-indigo-600 rounded-full"></span>
                        Access Control
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5 tracking-wider">Username</label>
                            <input type="text" id="username" placeholder="e.g. john_doe" 
                                   class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-sm">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5 tracking-wider">Password</label>
                            <input type="password" id="password" placeholder="••••••••" 
                                   class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-sm">
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3 pt-2">
                            <button onclick="handleAuth('login')" class="bg-slate-900 text-white py-3 rounded-xl font-bold text-sm hover:bg-slate-800 active:scale-95 transition-all">
                                Login
                            </button>
                            <button onclick="handleAuth('register')" class="border-2 border-slate-200 text-slate-700 py-3 rounded-xl font-bold text-sm hover:bg-slate-50 active:scale-95 transition-all">
                                Register
                            </button>
                        </div>
                    </div>
                </div>

                <div id="uploadCard" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 opacity-50 pointer-events-none transition-opacity">
                    <h2 class="text-lg font-bold mb-5 flex items-center gap-2">
                        <span class="w-1.5 h-5 bg-emerald-500 rounded-full"></span>
                        Secure Upload
                    </h2>
                    <div id="dropzone" class="group border-2 border-dashed border-slate-200 rounded-2xl p-8 text-center hover:border-indigo-400 hover:bg-indigo-50 transition-all cursor-pointer relative">
                        <div id="dropzoneContent">
                            <div class="bg-slate-100 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                                </svg>
                            </div>
                            <p class="text-xs font-semibold text-slate-600">Select File</p>
                        </div>
                        <input type="file" id="fileInput" class="hidden">
                    </div>
                    <button onclick="handleUpload()" class="w-full mt-6 bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 active:scale-95 transition-all shadow-lg shadow-indigo-100">
                        Sync to Vault
                    </button>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="bg-white min-h-[620px] rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                    <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                        <div class="flex items-center gap-3">
                            <h2 class="text-lg font-bold">Encrypted Vault</h2>
                            <span id="vaultOwner" class="hidden text-[10px] bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded font-bold uppercase tracking-tight"></span>
                        </div>
                        <button onclick="fetchFiles()" class="p-2 hover:bg-slate-200 rounded-lg transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                            </svg>
                        </button>
                    </div>
                    
                    <div id="fileList" class="p-6 space-y-4 flex-grow overflow-y-auto max-h-[500px]">
                        <div class="text-center py-32 text-slate-300">
                            <p>Authentication Required</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let token = "";
        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');
        const badge = document.getElementById('statusBadge');
        const uploadCard = document.getElementById('uploadCard');
        const ownerLabel = document.getElementById('vaultOwner');

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                document.getElementById('dropzoneContent').innerHTML = `
                    <div class="text-indigo-600">
                        <p class="font-bold text-xs truncate px-2">${file.name}</p>
                        <p class="text-[9px] text-slate-400 uppercase mt-1 tracking-widest">${(file.size/1024).toFixed(1)} KB</p>
                    </div>
                `;
            }
        });

        dropzone.onclick = () => fileInput.click();

        async function handleAuth(type) {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if (!u || !p) return alert("Username and Password are required.");

            const endpoint = type === 'register' ? '/register' : '/token';
            
            try {
                // FIXED: Moving credentials to the BODY to prevent terminal leaks
                const res = await fetch(endpoint, { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                
                const data = await res.json();
                if (!res.ok) return alert(data.detail || "Error during authentication.");

                if (type === 'register') {
                    alert("Account Created! You can now log in.");
                } else {
                    token = data.access_token;
                    setAuthState(u);
                    fetchFiles();
                }
            } catch (e) {
                alert("API Connection Error. Ensure server is running.");
            }
        }

        function setAuthState(username) {
            badge.innerText = "Authenticated";
            badge.classList.replace('bg-red-100', 'bg-emerald-100');
            badge.classList.replace('text-red-600', 'text-emerald-600');
            badge.classList.replace('border-red-200', 'border-emerald-200');
            
            uploadCard.classList.remove('opacity-50', 'pointer-events-none');
            ownerLabel.innerText = username;
            ownerLabel.classList.remove('hidden');
        }

        async function logout() {
            token = "";
            location.reload();
        }

        async function handleUpload() {
            if (!token || !fileInput.files[0]) return alert("Session invalid or no file selected.");

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const res = await fetch('/upload', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });

            if (res.ok) {
                alert("File Secured.");
                resetDropzone();
                fetchFiles();
            } else {
                alert("Upload failed.");
            }
        }

        function resetDropzone() {
            document.getElementById('dropzoneContent').innerHTML = `
                <div class="bg-slate-100 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                </div>
                <p class="text-xs font-semibold text-slate-600">Select File</p>
            `;
            fileInput.value = "";
        }

        async function fetchFiles() {
            if (!token) return;
            const res = await fetch('/files/me', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const files = await res.json();
            const list = document.getElementById('fileList');
            
            if (files.length === 0) {
                list.innerHTML = `<div class="text-center py-32 text-slate-400 text-sm italic">Vault empty.</div>`;
                return;
            }

            list.innerHTML = files.map(f => `
                <div class="p-4 bg-white border border-slate-200 rounded-xl flex justify-between items-center hover:border-indigo-300 transition-all group">
                    <div>
                        <p class="font-bold text-slate-700 text-xs truncate max-w-[150px]">${f.filename}</p>
                        <p class="text-[9px] text-slate-400 font-mono mt-0.5">${(f.size/1024).toFixed(1)} KB</p>
                    </div>
                    <button onclick="generateLink('${f.file_id}')" class="px-3 py-1.5 bg-slate-50 text-slate-600 text-[10px] font-bold rounded-lg hover:bg-slate-900 hover:text-white transition-all">
                        GET LINK
                    </button>
                </div>
            `).join('');
        }

        async function generateLink(fileId) {
            const res = await fetch(`/sign/${fileId}?ttl=3600`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            prompt("Signed URL (Expires in 1 Hour):", window.location.origin + data.signed_url);
        }
    </script>
</body>
</html>
