<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVault | API Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">
    <div class="max-w-5xl mx-auto py-12 px-6">
        
        <header class="mb-12 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">SecureVault API</h1>
                <p class="text-slate-500 mt-1">Encrypted Ingestion & Stateless Retrieval</p>
            </div>
            <div id="statusBadge" class="px-3 py-1 rounded-full bg-red-100 text-red-600 text-xs font-bold uppercase tracking-wider">
                Disconnected
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <span class="w-2 h-6 bg-indigo-600 rounded-full"></span>
                        1. Authenticate
                    </h2>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">User Identity</label>
                    <input type="text" id="userId" placeholder="e.g. john_doe" 
                           class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl mb-4 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    <p class="text-[10px] text-slate-400 italic">No password required for this simulation. Entering an ID creates a new session.</p>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <span class="w-2 h-6 bg-emerald-500 rounded-full"></span>
                        2. Upload
                    </h2>
                    <div id="dropzone" class="group border-2 border-dashed border-slate-200 rounded-2xl p-8 text-center hover:border-indigo-400 hover:bg-indigo-50 transition-all cursor-pointer relative">
                        <div id="dropzoneContent">
                            <div class="bg-slate-100 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3 group-hover:bg-indigo-100 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-400 group-hover:text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                                </svg>
                            </div>
                            <p class="text-sm font-medium text-slate-600">Select a file</p>
                            <p class="text-xs text-slate-400 mt-1">PDF, JPG, PNG, DOCX (Max 50MB)</p>
                        </div>
                        <input type="file" id="fileInput" class="hidden">
                    </div>
                    <button onclick="handleUpload()" class="w-full mt-6 bg-slate-900 text-white py-3 rounded-xl font-bold hover:bg-slate-800 transform active:scale-[0.98] transition-all shadow-lg shadow-slate-200">
                        Upload to Vault
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white min-h-[500px] rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                        <h2 class="text-lg font-bold">Your Secured Files</h2>
                        <button onclick="fetchFiles()" class="p-2 hover:bg-slate-200 rounded-lg transition-colors" title="Refresh List">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                            </svg>
                        </button>
                    </div>
                    
                    <div id="fileList" class="p-6 space-y-4">
                        <div class="text-center py-20">
                            <p class="text-slate-400">Enter a User ID and upload a file to begin.</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let token = "";
        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');
        const dropzoneContent = document.getElementById('dropzoneContent');
        const badge = document.getElementById('statusBadge');

        // UI: Show selected filename
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                dropzoneContent.innerHTML = `
                    <div class="text-indigo-600">
                        <p class="font-bold text-base truncate px-4">${file.name}</p>
                        <p class="text-[10px] text-slate-400 uppercase mt-1 tracking-widest">${(file.size/1024).toFixed(1)} KB Ready</p>
                    </div>
                `;
                dropzone.classList.add('border-indigo-400', 'bg-indigo-50');
            }
        });

        // Trigger file browser on click
        dropzone.onclick = () => fileInput.click();

        async function handleUpload() {
            const userId = document.getElementById('userId').value;
            if (!userId || !fileInput.files[0]) return alert("Please provide a User ID and select a file.");

            try {
                // 1. Get JWT Token (Simulated Login)
                const tokenRes = await fetch(`/token?user_id=${userId}`, { method: 'POST' });
                const tokenData = await tokenRes.json();
                token = tokenData.access_token;
                
                // Update Badge
                badge.innerText = "Authenticated";
                badge.classList.remove('bg-red-100', 'text-red-600');
                badge.classList.add('bg-emerald-100', 'text-emerald-600');

                // 2. Form Data Upload
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);

                const uploadRes = await fetch('/upload', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                if (uploadRes.ok) {
                    // Reset UI State
                    dropzoneContent.innerHTML = `
                        <div class="bg-slate-100 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                            </svg>
                        </div>
                        <p class="text-sm font-medium text-slate-600">Select another file</p>
                    `;
                    dropzone.classList.remove('border-indigo-400', 'bg-indigo-50');
                    fileInput.value = "";
                    fetchFiles();
                } else {
                    const err = await uploadRes.json();
                    alert("Upload Error: " + err.detail);
                }
            } catch (e) {
                alert("Connection Error. Ensure server is running on port 8000.");
            }
        }

        async function fetchFiles() {
            if (!token) return;
            const res = await fetch('/files/me', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const files = await res.json();
            const list = document.getElementById('fileList');
            
            if (files.length === 0) {
                list.innerHTML = `<div class="text-center py-20 text-slate-400">No files found for this user.</div>`;
                return;
            }

            list.innerHTML = files.map(f => `
                <div class="group p-4 bg-white border border-slate-200 rounded-xl flex justify-between items-center hover:border-indigo-200 hover:shadow-md transition-all">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-slate-100 rounded-lg flex items-center justify-center text-slate-400 group-hover:bg-indigo-50 group-hover:text-indigo-500 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd" />
                            </svg>
                        </div>
                        <div>
                            <p class="font-bold text-slate-800 text-sm">${f.filename}</p>
                            <div class="flex gap-3 mt-1">
                                <span class="text-[10px] text-slate-400 font-mono">${(f.size/1024).toFixed(1)} KB</span>
                            </div>
                        </div>
                    </div>
                    <button onclick="generateLink('${f.file_id}')" class="px-4 py-2 bg-slate-50 text-slate-600 text-xs font-bold rounded-lg hover:bg-indigo-600 hover:text-white transition-all border border-slate-100">
                        Get Signed Link
                    </button>
                </div>
            `).join('');
        }

        async function generateLink(fileId) {
            const res = await fetch(`/sign/${fileId}?ttl=3600`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            
            // For the demo, we show a prompt. In a real app, this would be a beautiful modal.
            const fullUrl = window.location.origin + data.signed_url;
            prompt("Copy this Signed URL (Valid for 1 Hour):", fullUrl);
        }
    </script>
</body>
</html>
